name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn tsc

      - name: Install CocoaPods
        working-directory: apps/example/ios
        run: pod install

      - name: Ensure Metro port is free
        run: |
          lsof -ti :8081 | xargs -r kill -9 || true

      - name: Start Package Manager
        working-directory: apps/example
        run: E2E=true yarn start &

      - name: Build example for iOS
        working-directory: apps/example
        run: yarn ios --simulator 'iPhone 16 Pro'

      - name: Run e2e tests
        working-directory: packages/webgpu
        run: CI=true E2E=true yarn test
