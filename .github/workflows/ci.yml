name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn tsc

      - name: Cache CocoaPods
        id: pods-cache
        uses: actions/cache@v3
        with:
          path: apps/example/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/example/ios/Podfile.lock') }}

      - name: Install CocoaPods
        if: steps.pods-cache.outputs.cache-hit != 'true'
        working-directory: apps/example/ios
        run: pod install

      - name: Ensure Metro port is free
        run: |
          lsof -ti :8081 | xargs -r kill -9 || true

      - name: Start Package Manager
        working-directory: apps/example
        run: CI=true yarn start &

      - name: Cache Xcode DerivedData
        uses: actions/cache@v3
        with:
          path: apps/example/ios/build
          key: ${{ runner.os }}-xcode-${{ hashFiles('apps/example/ios/Podfile.lock', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build example for iOS
        working-directory: apps/example/ios
        run: |
          set -o pipefail && xcodebuild \
            -workspace example.xcworkspace \
            -scheme Example \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DISABLE_MANUAL_TARGET_ORDER_BUILD_WARNING=YES \
            -disableAutomaticPackageResolution \
            build | xcpretty

      - name: Install and launch app on Simulator
        run: |
          xcrun simctl install booted apps/example/ios/build/Build/Products/Debug-iphonesimulator/ReactTestApp.app
          xcrun simctl launch booted com.microsoft.ReactTestApp

      - name: Run e2e tests
        working-directory: packages/webgpu
        run: yarn test

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NDK
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Set ANDROID_NDK
        run: echo "ANDROID_NDK=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Install Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/apps/example/android/local.properties

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
            apps/example/android/app/build
            apps/example/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/example/android/gradle/wrapper/gradle-wrapper.properties', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        working-directory: apps/example/android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: ./gradlew assembleDebug --warning-mode all
